<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Plagiarism Checker</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1d2671, #c33764);
            color: white;
            height: 100vh;
        }

        .card {
            border-radius: 15px;
        }

        .upload-box {
            border: 2px dashed #ccc;
            padding: 20px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
        }

        .upload-box:hover {
            background-color: #f8f9fa;
            color: black;
        }
    </style>
</head>
<body>

<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow-lg" style="width: 500px;">
        
        <h2 class="text-center mb-4 text-dark">🔍 Plagiarism Checker</h2>

        <form action="/check" method="post" enctype="multipart/form-data">

            <label class="form-label text-dark">Upload File 1</label>
            <input type="file" name="file1" class="form-control mb-3" required>

            <label class="form-label text-dark">Upload File 2</label>
            <input type="file" name="file2" class="form-control mb-4" required>

            <button type="submit" class="btn btn-primary w-100">Check Plagiarism</button>
        </form>

    </div>
</div>

</body>
</html>
