<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0f2027, #2c5364);
            color: white;
        }

        .card {
            border-radius: 15px;
        }

        .match-box {
            background: #f8f9fa;
            color: black;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container py-5">

    <div class="card p-4 shadow-lg">
        
        <h2 class="text-center text-dark">📊 Result</h2>

        <h3 class="text-center mt-3">
            Similarity Score: 
            <span class="
                {% if score > 80 %} text-danger
                {% elif score > 50 %} text-warning
                {% else %} text-success
                {% endif %}
            ">
                {{ score }}%
            </span>
        </h3>

        <div class="text-center mt-2">
            {% if score > 80 %}
                <span class="badge bg-danger">Highly Plagiarized</span>
            {% elif score > 50 %}
                <span class="badge bg-warning text-dark">Moderate Similarity</span>
            {% else %}
                <span class="badge bg-success">Low Similarity</span>
            {% endif %}
        </div>

        <hr>

        <h4 class="text-dark">Matched Sentences</h4>

        {% for sentence, score in matches %}
            <div class="match-box">
                <p>{{ sentence }}</p>
                <small>Score: {{ score }}</small>
            </div>
        {% endfor %}

        <a href="/" class="btn btn-outline-primary mt-3">⬅ Back</a>

    </div>

</div>

</body>
</html>
